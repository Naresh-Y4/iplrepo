<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPL Auction</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
 --v: #a855f7; --b: #0ea5e9; --pink: #ec4899; --dark: #020617;
 --glass: rgba(255, 255, 255, 0.08);
 --neon-v: 0 0 20px rgba(168, 85, 247, 0.6);
}

body, html {
 margin: 0; padding: 0; font-family: 'Outfit', 'Segoe UI', sans-serif;
 background: #000; color: white; overflow: hidden; height: 100vh;
}

/* 🏟️ AWESOME VIBRANT STADIUM BACKGROUND */
.bg-container {
 position: fixed; inset: 0; z-index: -3; overflow: hidden;
 background: url("https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2000") center/cover no-repeat;
 filter: brightness(0.4) saturate(1.8) contrast(1.1);
 animation: stadiumZoom 20s infinite alternate;
}
@keyframes stadiumZoom { from { transform: scale(1); } to { transform: scale(1.15); } }

/* Neon Light Beams */
.light-beams {
 position: fixed; inset: 0; z-index: -2;
 background: linear-gradient(45deg, transparent 40%, rgba(14, 165, 233, 0.1) 50%, transparent 60%);
 background-size: 200% 200%; animation: beams 8s linear infinite;
}
@keyframes beams { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.glass-overlay {
 position: fixed; inset: 0; z-index: -1;
 background: radial-gradient(circle at center, transparent, var(--dark) 90%);
}

/* ✨ GLASS TRANSITIONS */
.page {
 position: absolute; inset: 0; display: flex; flex-direction: column;
 align-items: center; justify-content: center; opacity: 0;
 transform: scale(0.9) translateY(20px); pointer-events: none; 
 transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
 padding: 20px; box-sizing: border-box;
}
.page.show { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }

/* 🃏 GLASS AUCTION CARD */
.glass-card {
 background: var(--glass); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
 padding: clamp(20px, 5vw, 40px); border-radius: 40px; 
 border: 1px solid rgba(255,255,255,0.2);
 box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), var(--neon-v);
 text-align: center; width: 100%; max-width: 420px;
 position: relative; animation: hoverFloat 5s ease-in-out infinite;
}
@keyframes hoverFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

/* 👤 PLAYER IMAGE GLASS WRAP */
.p-wrap { 
 position: relative; width: 160px; height: 160px; margin: 0 auto 15px;
 border-radius: 50%; padding: 5px;
 background: linear-gradient(135deg, var(--v), var(--b));
 box-shadow: 0 0 30px rgba(14, 165, 233, 0.5);
}
#pimg { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #fff; }
.img-enter { animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
@keyframes bounceIn { from { transform: scale(0) rotate(-45deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }

/* 🔨 HAMMER */
#hammer {
 position: absolute; top: -40px; right: -20px; font-size: 70px;
 opacity: 0; filter: drop-shadow(0 0 15px gold);
}
.strike { opacity: 1 !important; animation: gavelHit 0.5s ease forwards; }
@keyframes gavelHit { 0% { transform: rotate(45deg); } 50% { transform: rotate(-30deg); } 100% { transform: rotate(10deg); } }

/* 💰 PRICE & UI */
#price-display {
 font-size: clamp(34px, 8vw, 50px); font-weight: 900; 
 background: linear-gradient(to right, #fff, var(--b));
 -webkit-background-clip: text; -webkit-text-fill-color: transparent;
 margin: 15px 0; transition: 0.3s;
}
.bid-pop { animation: pop 0.4s ease; }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); filter: brightness(1.5); } 100% { transform: scale(1); } }

/* 🔘 GLASS BUTTONS */
.btn {
 background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
 border: 1px solid rgba(255,255,255,0.2); padding: 16px 40px; border-radius: 20px;
 color: white; font-weight: 800; cursor: pointer; transition: 0.3s;
 text-transform: uppercase; letter-spacing: 2px;
}
.btn-primary {
 background: linear-gradient(135deg, var(--v), var(--b));
 border: none; box-shadow: 0 10px 20px rgba(168, 85, 247, 0.4);
}
.btn:hover { transform: translateY(-3px) scale(1.02); background: rgba(255,255,255,0.2); box-shadow: var(--neon-v); }

/* 📱 SQUAD GRID */
.grid {
 display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
 gap: 15px; width: 100%; max-width: 900px;
}
.glass-tile {
 background: var(--glass); backdrop-filter: blur(15px);
 border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px;
}

#timer { font-size: 32px; color: #ff4757; font-weight: 900; text-shadow: 0 0 15px #ff4757; }
</style>
</head>
<body>

<div class="bg-container"></div>
<div class="light-beams"></div>
<div class="glass-overlay"></div>
<canvas id="fireworks" style="position:fixed; inset:0; pointer-events:none; z-index:100;"></canvas>

<div id="home" class="page show">
 <h1 style="font-size: clamp(40px, 10vw, 80px); letter-spacing: -2px; margin:0;">MEGA <span style="color:var(--b)">AUCTION</span></h1>
 <p style="letter-spacing: 10px; margin-bottom: 40px; opacity: 0.8;">ELITE GLASS ARENA</p>
 <button class="btn btn-primary" onclick="nav('teamSelect')">Enter Room</button>
</div>

<div id="teamSelect" class="page">
 <h2 style="margin-bottom:30px; text-shadow: var(--neon-v);">Select Franchise</h2>
 <div id="teamGrid" class="grid"></div>
</div>

<div id="auction" class="page">
 <div class="glass-card" id="mainCard">
  <div id="hammer">🔨</div>
  <div id="timer">30s</div>
  <div class="p-wrap"><img id="pimg" src="" alt=""></div>
  <h2 id="pname" style="margin:5px 0; font-size: 28px;"></h2>
  <div id="price-display">₹<span id="price">0</span> Cr</div>
  <button class="btn btn-primary" onclick="userBid()" style="width:100%">Raise Paddle</button>
  <p id="status-log" style="font-size:14px; color:var(--b); margin-top:20px; font-weight:bold;"></p>
 </div>
 <button class="btn" onclick="showSquads()" style="margin-top:20px">View Rosters</button>
</div>

<div id="squadPage" class="page">
 <h1 style="margin-bottom:20px">Current Squads</h1>
 <div id="squadGrid" class="grid" style="max-height: 60vh; overflow-y: auto; padding: 10px;"></div>
 <button class="btn btn-primary" onclick="nav('auction')" style="margin-top:20px">Return</button>
</div>

<script>
const teams = ["CSK", "MI", "RCB", "KKR", "RR", "SRH", "DC", "PBKS", "GT", "LSG"];
let purse = {}, rosters = {}, myTeam = "", pIdx = 0, currentPrice = 0, lead = null, timer;
let isSpeaking = false;

const players = [
 {n:"Virat Kohli", b:12, i:"https://p.imgci.com/db/PICTURES/CMS/316600/316661.png"},
 {n:"MS Dhoni", b:10, i:"https://p.imgci.com/db/PICTURES/CMS/319900/319938.png"},
 {n:"Rohit Sharma", b:10, i:"https://p.imgci.com/db/PICTURES/CMS/316500/316584.png"},
 {n:"Jasprit Bumrah", b:8, i:"https://p.imgci.com/db/PICTURES/CMS/316500/316584.png"},
 {n:"Rashid Khan", b:9, i:"https://p.imgci.com/db/PICTURES/CMS/316500/316513.png"}
];

function nav(id) {
 document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
 document.getElementById(id).classList.add('show');
 if(id==='teamSelect' && !document.getElementById('teamGrid').innerHTML) init();
}

function init() {
 const grid = document.getElementById('teamGrid');
 teams.forEach(t => {
  purse[t] = 100.0; rosters[t] = [];
  let b = document.createElement('button'); b.className = 'btn'; b.innerText = t;
  b.onclick = () => { myTeam = t; nav('auction'); next(); };
  grid.appendChild(b);
 });
}

async function speak(txt) {
 return new Promise(res => {
  window.speechSynthesis.cancel();
  const m = new SpeechSynthesisUtterance(txt);
  const v = window.speechSynthesis.getVoices();
  m.voice = v.find(x => x.name.includes('Female')) || v[0];
  m.pitch = 1.1; m.onstart = () => isSpeaking = true;
  m.onend = () => { isSpeaking = false; res(); };
  window.speechSynthesis.speak(m);
 });
}

async function next() {
 if(pIdx >= players.length) return speak("Auction Finished.");
 let p = players[pIdx];
 currentPrice = p.b; lead = null;
 
 const img = document.getElementById('pimg');
 img.classList.remove('img-enter');
 void img.offsetWidth;
 img.src = p.i; img.classList.add('img-enter');
 
 document.getElementById('pname').innerText = p.n;
 document.getElementById('price').innerText = currentPrice;
 document.getElementById('status-log').innerText = "INVITING BIDS";
 
 await speak(p.n + ". Base price " + p.b + " Crores.");
 startTimer(30);
}

function startTimer(s) {
 let left = s;
 clearInterval(timer);
 timer = setInterval(() => {
  if(!isSpeaking) {
   left--;
   document.getElementById('timer').innerText = left + "s";
   if(left > 5 && Math.random() > 0.85) aiBid();
   if(left === 3 && lead) speak("Going once...");
   if(left === 1 && lead) speak("Going twice...");
   if(left <= 0) { clearInterval(timer); sold(); }
  }
 }, 1000);
}

function userBid() { if(purse[myTeam] >= currentPrice + 0.5) place(myTeam); }
function aiBid() {
 const o = teams.filter(t => t !== lead && t !== myTeam && purse[t] >= currentPrice + 0.5);
 if(o.length) place(o[Math.floor(Math.random()*o.length)]);
}

function place(t) {
 currentPrice += 0.5; lead = t;
 const d = document.getElementById('price-display');
 d.classList.remove('bid-pop'); void d.offsetWidth; d.classList.add('bid-pop');
 document.getElementById('price').innerText = currentPrice;
 document.getElementById('status-log').innerText = t + " TAKES THE LEAD";
 speak(t + " bids " + currentPrice);
 if(parseInt(document.getElementById('timer').innerText) < 10) startTimer(10);
}

async function sold() {
 const h = document.getElementById('hammer'); h.classList.add('strike');
 if(lead) {
  purse[lead] -= currentPrice;
  rosters[lead].push(players[pIdx].n + " (₹" + currentPrice + "Cr)");
  await speak("Sold! To " + lead);
  boom();
 } else { await speak(players[pIdx].n + " Unsold."); }
 
 setTimeout(() => {
  h.classList.remove('strike'); pIdx++; next();
 }, 1500);
}

function showSquads() {
 const g = document.getElementById('squadGrid'); g.innerHTML = "";
 teams.forEach(t => {
  let d = document.createElement('div'); d.className = "glass-tile";
  d.innerHTML = `<b style="color:var(--b)">${t}</b><br><small>Budget: ₹${purse[t].toFixed(1)} Cr</small><br><div style="font-size:11px; margin-top:5px; opacity:0.8">${rosters[t].join(", ") || "No Players"}</div>`;
  g.appendChild(d);
 });
 nav('squadPage');
}

function boom() {
 const c = document.getElementById('fireworks'); const ctx = c.getContext('2d');
 c.width = window.innerWidth; c.height = window.innerHeight;
 let p = []; for(let i=0; i<50; i++) p.push({x:c.width/2, y:c.height/2, dx:Math.random()*10-5, dy:Math.random()*10-5, l:1});
 function draw() {
  ctx.clearRect(0,0,c.width,c.height);
  p.forEach(i => { i.x+=i.dx; i.y+=i.dy; i.l-=0.02; ctx.fillStyle=`rgba(14, 165, 233,${i.l})`; ctx.beginPath(); ctx.arc(i.x,i.y,3,0,7); ctx.fill(); });
  if(p[0].l > 0) requestAnimationFrame(draw);
 }
 draw();
}
</script>
</body>
</html>
